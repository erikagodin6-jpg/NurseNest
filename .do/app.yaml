name: nursenest
region: tor

services:
  - name: web
    environment_slug: docker
    source_dir: /
    http_port: 5000
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    health_check:
      http_path: /
      initial_delay_seconds: 30
      period_seconds: 15
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 6
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: RUN_HEAVY_BUILD_TASKS
        value: "0"
      - key: SKIP_I18N_VALIDATION
        value: "1"
      - key: SKIP_I18N_COMPILE
        value: "1"
      - key: SKIP_BUILD_REPORTS
        value: "1"
      - key: VITE_SKIP_CIRCULAR_CHECK
        value: "1"
      - key: ADMIN_JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
