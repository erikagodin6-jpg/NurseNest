name: nursenest
region: tor

services:
  - name: web
    environment_slug: docker
    source_dir: /
    run_command: node scripts/start-production.mjs
    http_port: 8080
    internal_ports:
      - 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    health_check:
      # Lightweight endpoint; matches root Express server/index.ts
      http_path: /healthz
      initial_delay_seconds: 60
      period_seconds: 15
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 6
    liveness_health_check:
      http_path: /healthz
      initial_delay_seconds: 60
      period_seconds: 15
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 6
    envs:
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
      - key: PORT
        value: "8080"
        scope: RUN_TIME
      - key: ADMIN_JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      # Auth.js (nursenest-core): required when Next.js is deployed behind a proxy
      - key: AUTH_TRUST_HOST
        value: "true"
        scope: RUN_TIME
