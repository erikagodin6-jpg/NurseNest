name: Build and Push GHCR Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-build-main
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            Dockerfile
            .dockerignore
            package.json
            package-lock.json
            tsconfig.json
            tsconfig.server.json
            vite.config.ts
            postcss.config.js
            components.json
            drizzle.config.ts
            i18n-scan.config.json
            vite-plugin-meta-images.ts
            client/**
            !client/src/assets/**
            server
            shared
            script
            scripts
            config
            migrations
            backup-system

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          set -euxo pipefail
          IMAGE="ghcr.io/${{ github.repository_owner }}/nursenest"
          SHORT_SHA="${GITHUB_SHA::7}"
          docker build -t "${IMAGE}:latest" -t "${IMAGE}:sha-${SHORT_SHA}" .
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:sha-${SHORT_SHA}"
